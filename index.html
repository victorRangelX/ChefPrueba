<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat de Recetas</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.mensaje {
  max-width: 70%;
  padding: 10px 15px;
  margin: 5px 0;
  border-radius: 15px;
}

.usuario {
  align-self: flex-end;
  background: #2563eb;
}

.ia {
  align-self: flex-start;
  background: #1e293b;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #020617;
}

#input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Pide una receta...">
  <button onclick="enviar()">Enviar</button>
</div>

<script>
const chat = document.getElementById("chat");

function agregarMensaje(texto, tipo) {
  const div = document.createElement("div");
  div.className = "mensaje " + tipo;
  div.innerText = texto;
  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}

async function enviar() {
  const input = document.getElementById("input");
  const mensaje = input.value;

  if (!mensaje) return;

  agregarMensaje(mensaje, "usuario");
  input.value = "";

  const res = await fetch("/preguntar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ mensaje }),
  });

  const data = await res.json();

  agregarMensaje(data.respuesta, "ia");
}
</script>

</body>
</html>
